<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Router</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Markdown rendering + syntax highlighting + sanitization -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- ── Left sidebar ─────────────────────────────────────── -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>AI Router</h1>
                <p class="sidebar-sub">Free providers &mdash; no login</p>
            </div>

            <div class="provider-list" id="provider-list">
                <!-- Populated by JS from /api/providers -->
            </div>

            <div class="sidebar-footer">
                <div id="rr-status" class="rr-status">Checking...</div>
            </div>
        </aside>

        <!-- ── Right chat panel ──────────────────────────────────── -->
        <main class="chat-panel">
            <div class="chat-messages" id="chat-messages">
                <div class="msg msg--system">
                    Welcome! Select a provider or let the round-robin pick one.
                    Messages are forwarded to Google AI, DuckDuckGo AI, or Perplexity.
                </div>
            </div>

            <div class="chat-input-bar">
                <textarea
                    id="message-input"
                    placeholder="Type your message… (Enter to send, Shift+Enter for newline)"
                    rows="3"
                ></textarea>
                <button id="btn-send" class="btn btn-primary">Send</button>
            </div>
        </main>
    </div>

    <script>
    (() => {
        // ── State ───────────────────────────────────────────────────
        let providers = {};
        let activeProvider = null;  // pin to a specific provider, or null for round-robin

        // ── DOM refs ────────────────────────────────────────────────
        const providerList  = document.getElementById('provider-list');
        const chatMessages  = document.getElementById('chat-messages');
        const messageInput  = document.getElementById('message-input');
        const btnSend       = document.getElementById('btn-send');
        const rrStatus      = document.getElementById('rr-status');

        // ── Provider polling ────────────────────────────────────────
        async function fetchProviders() {
            try {
                const res = await fetch('/api/providers');
                providers = await res.json();
                renderProviders();
            } catch (e) {
                console.error('fetchProviders:', e);
            }
        }

        function startPolling() {
            fetchProviders();
            setInterval(fetchProviders, 10000);
        }

        // ── Render sidebar ──────────────────────────────────────────
        function renderProviders() {
            providerList.innerHTML = '';
            const names = Object.values(providers).map(p => p.name);
            rrStatus.textContent = 'Round-robin: ' + names.join(' → ');
            rrStatus.className = 'rr-status rr-status--active';

            for (const [id, p] of Object.entries(providers)) {
                const card = document.createElement('div');
                card.className = 'provider-card provider-card--ready' +
                    (activeProvider === id ? ' provider-card--active' : '');
                card.dataset.provider = id;
                card.style.cursor = 'pointer';

                const dot = document.createElement('span');
                dot.className = 'provider-dot' +
                    (activeProvider === id ? ' dot--active' : ' dot--ready');

                const icon = document.createElement('span');
                icon.className = 'provider-icon';
                icon.style.background = p.color;
                icon.textContent = p.icon;

                const info = document.createElement('div');
                info.className = 'provider-info';

                const name = document.createElement('span');
                name.className = 'provider-name';
                name.textContent = p.name;

                const statusLabel = document.createElement('span');
                statusLabel.className = 'provider-status-label';
                statusLabel.textContent = activeProvider === id ? 'Selected' : 'Ready';

                info.appendChild(name);
                info.appendChild(statusLabel);

                const btn = document.createElement('button');
                btn.className = 'btn btn-sm ' +
                    (activeProvider === id ? 'btn-primary' : 'btn-outline');
                btn.textContent = activeProvider === id ? 'Using' : 'Select';
                btn.dataset.provider = id;

                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (activeProvider === id) {
                        activeProvider = null;  // deselect → back to round-robin
                    } else {
                        activeProvider = id;
                    }
                    renderProviders();
                });

                card.appendChild(dot);
                card.appendChild(icon);
                card.appendChild(info);
                card.appendChild(btn);
                providerList.appendChild(card);
            }
        }

        // ── Chat ────────────────────────────────────────────────────
        btnSend.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg) return;
            addUserMsg(msg);
            messageInput.value = '';
            btnSend.disabled = true;
            btnSend.textContent = 'Sending...';

            const loadingId = addLoadingMsg();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: msg,
                        provider: activeProvider,
                    }),
                });
                const data = await res.json();
                removeLoadingMsg(loadingId);

                if (data.success) {
                    addAssistantMsg(data.response, data.provider);
                } else {
                    addErrorMsg('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                removeLoadingMsg(loadingId);
                addErrorMsg('Network error: ' + e.message);
            }

            btnSend.disabled = false;
            btnSend.textContent = 'Send';
        }

        // ── Message helpers ─────────────────────────────────────────
        function addUserMsg(text) {
            const d = document.createElement('div');
            d.className = 'msg msg--user';
            d.textContent = text;
            chatMessages.appendChild(d);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addAssistantMsg(text, providerId) {
            const p = providers[providerId] || { name: providerId, color: '#888', icon: '?' };
            const wrap = document.createElement('div');
            wrap.className = 'msg msg--assistant';

            const badge = document.createElement('span');
            badge.className = 'provider-badge';
            badge.style.background = p.color;
            badge.textContent = p.name;

            const body = document.createElement('div');
            body.className = 'msg-md';
            body.innerHTML = renderMarkdown(text);
            if (window.hljs) {
                body.querySelectorAll('pre code').forEach((el) => {
                    try { window.hljs.highlightElement(el); } catch (e) {}
                });
            }

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = 'Copy';
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                });
            });

            wrap.appendChild(badge);
            wrap.appendChild(body);
            wrap.appendChild(copyBtn);
            chatMessages.appendChild(wrap);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function renderMarkdown(text) {
            text = text || '';
            if (window.marked && window.DOMPurify) {
                try {
                    marked.setOptions({ breaks: true, gfm: true });
                    const html = marked.parse(text);
                    return DOMPurify.sanitize(html);
                } catch (e) { /* fall through */ }
            }
            const esc = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return '<p>' + esc.replace(/\n/g, '<br>') + '</p>';
        }

        function addSystemMsg(text) {
            const d = document.createElement('div');
            d.className = 'msg msg--system';
            d.textContent = text;
            chatMessages.appendChild(d);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addErrorMsg(text) {
            const d = document.createElement('div');
            d.className = 'msg msg--error';
            d.textContent = text;
            chatMessages.appendChild(d);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        let _loadingCounter = 0;
        function addLoadingMsg() {
            const id = 'loading-' + (++_loadingCounter);
            const d = document.createElement('div');
            d.className = 'msg msg--loading';
            d.id = id;
            d.innerHTML = '<span class="dot-pulse"></span><span class="dot-pulse"></span><span class="dot-pulse"></span>';
            chatMessages.appendChild(d);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function removeLoadingMsg(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // ── Init ────────────────────────────────────────────────────
        startPolling();
    })();
    </script>
</body>
</html>
